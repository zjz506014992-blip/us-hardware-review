name: Daily FMP fetch + page rebuild

on:
  schedule:
    - cron: '30 22 * * 1-5'
  workflow_dispatch:
    inputs:
      review_date:
        description: '强制指定交易日 (YYYY-MM-DD)，留空则自动从 FMP 推断'
        required: false
        default: ''
      earnings_mode:
        description: '业绩历史模式: delta (默认日增量) / refresh-recent (重拉近 180 天) / full (全量回填 313 calls)'
        required: false
        default: 'delta'
        type: choice
        options: [delta, refresh-recent, full]
      fetch_profiles:
        description: '是否拉取公司 profile (313 calls). 通常每周日自动跑, 这里强制触发用'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: daily-fetch
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch FMP /quote
        id: fetch
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          REVIEW_DATE: ${{ github.event.inputs.review_date }}
        run: python fetch_fmp.py

      - name: Fetch earnings history
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          MODE: ${{ github.event.inputs.earnings_mode || 'delta' }}
        run: |
          if [ "$MODE" = "full" ]; then
            python fetch_earnings_history.py --full
          elif [ "$MODE" = "refresh-recent" ]; then
            python fetch_earnings_history.py --refresh-recent 180
          else
            python fetch_earnings_history.py
            if [ "$(date -u +%u)" = "7" ]; then
              echo "Sunday: also running refresh-recent"
              python fetch_earnings_history.py --refresh-recent 180
            fi
          fi

      - name: Fetch company profiles
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FORCE: ${{ github.event.inputs.fetch_profiles }}
        run: |
          # profiles 不常变, 每周日跑 + 手动 force, 否则跳过
          if [ "$FORCE" = "true" ]; then
            echo "Manual force: fetching profiles"
            python fetch_earnings_history.py --profiles
          elif [ ! -f company_profiles.json ]; then
            echo "company_profiles.json missing: bootstrapping"
            python fetch_earnings_history.py --profiles
          elif [ "$(date -u +%u)" = "7" ]; then
            echo "Sunday: refreshing profiles"
            python fetch_earnings_history.py --profiles
          else
            echo "Skipping profiles (only runs Sundays or when missing)"
          fi

      - name: Generate pages
        run: python gen.py

      - name: Show diff
        run: |
          echo "Changed:"
          git status --short
          ls -la confirmed_*.json earnings_history.json company_profiles.json 2>/dev/null | tail -5 || true

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes"; exit 0
          fi
          git add -A
          git commit -m "auto: FMP daily fetch ${{ steps.fetch.outputs.date }} (hit ${{ steps.fetch.outputs.hit }}/313)"
          for i in 1 2 3 4; do
            git push origin main && break || sleep $((2**i))
          done
